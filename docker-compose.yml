services:
  # ===================
  # Backend API Server
  # ===================
  api:
    build:
      context: ./scrapetrack-backend
      dockerfile: Dockerfile
    container_name: scrapetrack-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - ./scrapetrack-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - scrapetrack-network

  # ===================
  # Worker Process(es)
  # ===================
  worker:
    build:
      context: ./scrapetrack-backend
      dockerfile: Dockerfile
    command: ["node", "src/worker.js"]
    environment:
      - NODE_ENV=production
    env_file:
      - ./scrapetrack-backend/.env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scrapetrack-network

  # ===================
  # Frontend (React)
  # ===================
  frontend:
    build:
      context: ./scrapetrack-dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001/api
    container_name: scrapetrack-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - scrapetrack-network

networks:
  scrapetrack-network:
    driver: bridge
